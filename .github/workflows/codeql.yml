name: CodeQL

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0
        with:
          submodules: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b943c0f8f2648e742f562fc3ebefdfd8de2f9d96 # v3.27.5
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@b943c0f8f2648e742f562fc3ebefdfd8de2f9d96 # v3.27.5

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b943c0f8f2648e742f562fc3ebefdfd8de2f9d96 # v3.27.5
